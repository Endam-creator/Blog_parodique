<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Le Blog des Vérités Cachées - La voix de ceux qui savent</title>
    <style>
        :root {
            --outer-bg: #555555;
            --site-bg: #f0f0f0;
            --header-bg: #222222;
            --accent-green: #76b900;
            --accent-green-hover: #8ae000;
            --card-bg: #ffffff;
            --text-dark: #000000;
            --text-light: #ffffff;
            --border-dark: #222222;
            --danger-red: #8b0000;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Arial', 'Helvetica Neue', sans-serif;
        }

        body {
            background-color: var(--outer-bg);
            color: var(--text-dark);
            padding: 20px;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            background-color: var(--site-bg);
            border: 3px solid var(--border-dark);
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        /* HEADER */
        header {
            display: flex;
            align-items: center;
            background-color: var(--header-bg);
            color: var(--text-light);
            padding: 15px 20px;
            border-bottom: 6px solid var(--accent-green);
        }

        .logo-area {
            margin-right: 25px;
            display: flex;
            align-items: center;
            cursor: pointer;
        }

        .logo-img {
            width: 85px;
            height: 85px;
            object-fit: contain;
        }

        .header-titles h1 {
            font-family: 'Impact', 'Arial Black', sans-serif;
            font-size: 2.3rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            line-height: 1.1;
        }

        .header-titles p {
            color: var(--accent-green);
            font-style: italic;
            font-weight: bold;
            font-size: 1.2rem;
            margin-top: 2px;
        }

        .edition-tag {
            font-size: 0.95rem;
            color: #cccccc;
            margin-top: 4px;
            font-family: monospace;
        }

        /* MAIN LAYOUT */
        .main-layout {
            display: grid;
            grid-template-columns: 1fr;
            gap: 20px;
            padding: 20px;
        }

        @media (min-width: 950px) {
            .main-layout {
                grid-template-columns: 63fr 37fr;
            }
        }

        /* ARTICLE AFFICHÉ (GAUCHE) */
        .featured-story {
            background-color: var(--card-bg);
            border: 2px solid var(--border-dark);
            padding: 20px;
            display: flex;
            flex-direction: column;
        }

        .meta-data {
            font-family: monospace;
            font-size: 0.9rem;
            color: #555;
            margin-bottom: 10px;
            border-bottom: 1px dashed #ccc;
            padding-bottom: 5px;
        }

        .breaking-banner {
            background-color: var(--accent-green);
            color: var(--text-dark);
            padding: 6px 15px;
            font-family: 'Impact', sans-serif;
            font-size: 1.1rem;
            text-transform: uppercase;
            align-self: flex-start;
            margin-bottom: 15px;
            transform: skewX(-10deg);
        }

        .hero-title-area h2 {
            font-family: 'Impact', 'Arial Black', sans-serif;
            font-size: 1.8rem;
            line-height: 1.3;
            text-transform: uppercase;
            margin-bottom: 15px;
        }

        .hero-image-container {
            width: 100%;
            height: 350px;
            background-color: #ddd;
            border: 2px solid var(--border-dark);
            overflow: hidden;
            margin-bottom: 15px;
        }

        .hero-image-container img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .article-body {
            font-size: 1.05rem;
            line-height: 1.6;
            color: #222;
        }

        .article-body p {
            margin-bottom: 15px;
        }

        .interview-box {
            background-color: #f9f9f9;
            border-left: 4px solid var(--accent-green);
            padding: 15px;
            margin: 20px 0;
        }

        .interview-line {
            margin-bottom: 12px;
        }

        .redac-notice {
            background-color: #fff2a3;
            border: 2px dashed var(--danger-red);
            padding: 15px;
            margin-top: 20px;
            font-weight: bold;
        }

        /* INTERFACE D'ADMINISTRATION (CRÉATION) */
        .admin-panel {
            background-color: #222;
            color: #fff;
            padding: 20px;
            border: 2px solid var(--accent-green);
            margin: 20px;
            display: none; /* Masqué par défaut */
        }

        .admin-panel h3 {
            font-family: 'Impact', sans-serif;
            color: var(--accent-green);
            margin-bottom: 15px;
            text-transform: uppercase;
        }

        .form-group {
            margin-bottom: 12px;
            display: flex;
            flex-direction: column;
        }

        .form-group label {
            font-size: 0.85rem;
            color: #aaa;
            margin-bottom: 4px;
        }

        .form-group input, .form-group textarea {
            padding: 8px;
            border: 1px solid #444;
            background-color: #111;
            color: #fff;
            font-family: inherit;
        }

        .form-group textarea {
            resize: vertical;
            height: 80px;
        }

        /* COLONNE DROITE (LISTE) */
        .stories-feed {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .feed-card {
            display: grid;
            grid-template-columns: 110px 1fr;
            background-color: var(--card-bg);
            border: 2px solid var(--border-dark);
            min-height: 105px;
            position: relative;
            cursor: pointer;
            transition: transform 0.15s ease, box-shadow 0.15s ease;
        }

        .feed-card:hover {
            transform: translateY(-2px);
            box-shadow: 4px 4px 0px var(--border-dark);
        }

        .feed-img-area {
            width: 110px;
            height: 100%;
            background-color: #e5e5e5;
            border-right: 2px solid var(--border-dark);
            overflow: hidden;
        }

        .feed-img-area img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .feed-content {
            padding: 12px;
            display: flex;
            flex-direction: column;
        }

        .feed-title {
            font-family: 'Impact', sans-serif;
            font-size: 0.95rem;
            color: var(--text-dark);
            text-transform: uppercase;
            margin-bottom: 4px;
        }

        .feed-desc {
            font-size: 0.85rem;
            color: #444444;
            line-height: 1.35;
            margin-bottom: 8px;
        }

        /* VOTES */
        .vote-system {
            display: flex;
            gap: 8px;
            margin-top: auto;
        }

        .vote-btn {
            background-color: #f5f5f5;
            border: 1px solid #999999;
            padding: 2px 8px;
            font-size: 0.75rem;
            font-weight: bold;
            cursor: pointer;
        }

        .vote-btn.active-up { background-color: var(--accent-green); color: white; }
        .vote-btn.active-down { background-color: var(--danger-red); color: white; }

        /* FOOTER & NEWSLETTER */
        .newsletter-bar {
            background-color: var(--header-bg);
            color: var(--text-light);
            padding: 20px;
            border-top: 4px solid var(--border-dark);
            display: flex;
            flex-wrap: wrap;
            justify-content: space-between;
            align-items: center;
            gap: 15px;
        }

        .subscribe-tag { font-family: 'Impact', sans-serif; font-size: 1.8rem; color: var(--accent-green); }
        .newsletter-form { display: flex; gap: 10px; flex-grow: 1; max-width: 500px; }
        .newsletter-form input { flex-grow: 1; padding: 10px; }
        .btn-submit { background-color: var(--accent-green); padding: 10px 25px; font-family: 'Impact', sans-serif; cursor: pointer; border: none;}
        .footer-caption { width: 100%; text-align: center; color: var(--accent-green); font-family: monospace; font-size: 0.85rem; }

        footer { background-color: #111111; padding: 15px; text-align: center; }
        .footer-links a { color: #aaaaaa; margin: 0 10px; font-size: 0.85rem; }
    </style>
</head>
<body>

<div class="container">
    <!-- HEADER -->
    <header>
        <div class="logo-area" onclick="toggleAdminPanel()" title="Clic secret pour l'interface de création">
            <img src="logo_chat_loupe.png" alt="Logo" class="logo-img">
        </div>
        <div class="header-titles">
            <h1>Le Blog des Vérités Cachées</h1>
            <p>- *La voix de ceux qui savent* -</p>
            <div class="edition-tag">Édition Nationale & Univers Connexes</div>
        </div>
    </header>

    <!-- INTERFACE DE CRÉATION CRITIQUABLE / CACHÉE -->
    <div id="adminPanel" class="admin-panel">
        <h3>Console de Transmission de l'Investigateur (Ajouter un Article)</h3>
        <form onsubmit="createNewArticle(event)">
            <div class="form-group"><label>Titre de l'enquête</label><input type="text" id="formTitle" required placeholder="Ex: L'HOMME QUI PARLE AUX JETS D'EAU"></div>
            <div class="form-group"><label>Date de publication</label><input type="text" id="formDate" value="Dimanche 7 juin 2026"></div>
            <div class="form-group"><label>Localisation</label><input type="text" id="formLoc" placeholder="Ex: National (Enquête en Normandie)"></div>
            <div class="form-group"><label>Auteur</label><input type="text" id="formAuthor" value="L'Investigateur Anonyme"></div>
            <div class="form-group"><label>Chapô / Introduction de l'enquête</label><textarea id="formIntro" required placeholder="Alors que la science prétend..."></textarea></div>
            <div class="form-group"><label>Interview Exclusive (Format clé:valeur séparé par des sauts de ligne, ex: Le Blog:Votre question\nUlf:Ma réponse)</label><textarea id="formInterview" style="height:120px;" placeholder="Le Blog: Votre question ?&#10;Ulf: Ma réponse."></textarea></div>
            <div class="form-group"><label>⚠️ L'AVIS DE LA RÉDACTION</label><textarea id="formNotice" placeholder="La prochaine fois que..."></textarea></div>
            <div class="form-group"><label>Image d'illustration (Nom du fichier local ou URL)</label><input type="text" id="formImg" placeholder="rumpologie_allemande.png"></div>
            <button type="submit" class="btn-submit" style="border:1px solid #fff">Diffuser l'enquête apocryphe</button>
        </form>
    </div>

    <!-- MAIN GRIDS -->
    <div class="main-layout">
        
        <!-- ARTICLE VISUALISÉ EN DIRECT (GAUCHE) -->
        <div class="featured-story" id="articleViewer">
            <!-- Rempli dynamiquement par JavaScript -->
        </div>

        <!-- FIL D'ACTUALITÉS (DROITE) -->
        <div class="stories-feed" id="storiesFeed">
            <!-- Rempli dynamiquement par JavaScript -->
        </div>
    </div>

    <!-- S'ABONNER -->
    <div class="newsletter-bar">
        <div class="subscribe-tag">S'abonner</div>
        <form class="newsletter-form" onsubmit="event.preventDefault(); alert('Canal crypté configuré.');">
            <input type="email" placeholder="Email email..." required>
            <button type="submit" class="btn-submit">S'abonner</button>
        </form>
        <div class="footer-caption">REJOIGNEZ LA RÉSISTANCE ANTI-RÉEL (GRATUITEMENT !)</div>
    </div>

    <footer>
        <div class="footer-links">
            <a href="#" onclick="toggleAdminPanel(); return false;">[Accès Cabinet Secret]</a>
            <a href="#">Mentions (Pas très) Légales</a>
        </div>
    </footer>
</div>

<script>
// BASE DE DONNÉES DE DÉPART (Tes articles)
const defaultArticles = [
    {
        id: "art-médium",
        title: "INVESTIGATION TRANSFRONTALIÈRE : « Oubliez les lignes de la main : la vérité sur votre avenir est écrite sur vos fessiers, selon ce médium allemand »",
        date: "Dimanche 7 juin 2026",
        location: "International (Enquête en Rhénanie-du-Nord-Westphalie)",
        author: "L'Investigateur Anonyme",
        img: "rumpologie_allemande.png",
        desc: "L'avenir est écrit sur vos fesses : un médium non-voyant allemand lit le destin de ses clients en tâtant leur anatomie.",
        intro: "Alors que les voyants traditionnels s'épuisent à scruter des cartes de tarot ou à déchiffrer les plis de vos paumes, la science occulte vient de franchir une nouvelle frontière en Europe. Outre-Rhin, un homme a développé une méthode de divination unique au monde, basée sur la topographie musculaire et thermique de l'anatomie humaine. Pour lui, le grand livre du destin ne s'ouvre pas dans les mains, mais un peu plus bas. Nous avons traversé la frontière pour rencontrer Ulf S., 58 ans, un médium non-voyant qui redéfinit l'art de la voyance depuis son cabinet près de Cologne.",
        interview: [
            { q: "Le Blog : Ulf, votre spécialité, baptisée la \"Rumpologie\", suscite beaucoup de curiosité. Comment vous est venue cette intuition ?", a: "Les mains mentent. Les gens passent leur temps à travailler, à frotter, à modifier la peau de leurs doigts. Mais l'arrière du corps, lui, ne triche jamais. C'est la zone où s'accumulent toutes les tensions existentielles, les traumatismes du passé et l'énergie brute de l'avenir. Étant non-voyant, mes mains ont développé une sensibilité nerveuse hors du commun. Quand un client s'assoit sur ma table d'examen et que je pose mes paumes sur ses fessiers, je perçois des vibrations temporelles immédiates." },
            { q: "Le Blog : Concrètement, qu'est-ce que la texture ou la forme de cette zone peut bien révéler sur le caractère d'une personne ?", a: "Tout est une question de quadrants et de polarité thermique. Par exemple, une fesse gauche plus ferme et plus chaude indique un tempérament de leader, quelqu'un qui va recevoir une promotion ou faire une rentrée d'argent majeure dans les six mois. En revanche, des micro-tensions localisées dans le muscle grand fessier droit révèlent une trahison passée non digérée ou un secret de famille enfoui. La forme générale — en pomme, en poire ou en carré — dessine les grandes lignes de la personnalité : les \"pommes\" sont des idéalistes souvent ciblés par les puces 5G, tandis que les \"carrés\" sont des esprits cartésiens piégés dans la matrice officielle." },
            { q: "Le Blog : Votre méthode est très physique. Comment réagissent les clients qui franchissent la porte de votre cabinet ?", a: "Au début, les Allemands sont très réservés, c'est dans leur nature. Mais quand je leur annonce, après seulement trois secondes de palpation, le montant exact de leur livret d'épargne ou l'année de disparition de leur grand-oncle, toute la gêne s'évapore. J'ai des hommes d'affaires, des politiciens et même des agents de la fonction publique qui viennent me voir incognito avant de prendre des décisions géopolitiques majeures. Ils savent que ma méthode est infaillible." },
            { q: "Le Blog : Les sceptiques de la science officielle crient évidemment à la supercherie ou à l'excentricité...", a: "Laissez les scientifiques en blouse blanche s'agiter avec leurs statistiques. Pendant qu'ils analysent des données biaisées par des algorithmes, moi je touche la réalité du squelette et de l'énergie humaine. La vérité est ancrée dans la matière. Le corps humain est une carte routière cosmique ; il suffit de savoir où poser les mains pour lire les panneaux de signalisation." }
        ],
        notice: "La prochaine fois que vous passerez un entretien d'embauche ou un contrôle de sécurité, surveillez vos arrières. Si la divination fessière se démocratise en France, il faudra soigner votre posture sur votre chaise pour ne pas envoyer de mauvaises ondes à vos examinateurs."
    },
    {
        id: "art-psychique",
        title: "TÉMOIGNAGE CHOC : \"Mon appartement est une zone de guerre psychique quand je fais des cauchemars !\"",
        date: "Vendredi 5 juin 2026",
        location: "National (Alerte Risques)",
        author: "L'Investigateur Anonyme",
        img: "photo_temoignage.jpg",
        desc: "Zone de guerre ouverte à domicile : quand l'esprit modifie la structure atomique des murs pendant le sommeil profond.",
        intro: "Vous en avez assez des versions officielles lisses et ennuyeuses ? Vous sentez que la vérité est plus tordue, plus folle, plus... réelle ? Vous êtes au bon endroit. \"Le Blog des Vérités Cachées\" plonge dans le quotidien secret de vos voisins pour révéler l'incroyable complot qui se tisse sous nos yeux. Puces 5G invisibles, mutants planqués dans la plomberie, lucioles drones biologiques... tout est là.",
        interview: [],
        notice: "Ne dormez jamais sans avoir préalablement coupé vos disjoncteurs."
    }
];

// Initialisation des articles depuis le localStorage ou la base par défaut
let articles = JSON.parse(localStorage.getItem('blog_articles')) || defaultArticles;

// AFFICHER LA LISTE DE DROITE
function renderFeed() {
    const feed = document.getElementById('storiesFeed');
    feed.innerHTML = "";
    
    articles.forEach(art => {
        let card = document.createElement('div');
        card.className = 'feed-card';
        card.onclick = () => displayArticle(art.id);
        
        // Base de calcul pour simuler les votes de manière réaliste
        let baseUp = Math.abs(art.id.length * 7) + (localStorage.getItem('vote_' + art.id) === 'up' ? 1 : 0);
        let baseDown = Math.abs(art.id.length % 3) + (localStorage.getItem('vote_' + art.id) === 'down' ? 1 : 0);
        
        let activeUp = localStorage.getItem('vote_' + art.id) === 'up' ? 'active-up' : '';
        let activeDown = localStorage.getItem('vote_' + art.id) === 'down' ? 'active-down' : '';

        card.innerHTML = `
            <div class="feed-img-area"><img src="${art.img || 'logo_chat_loupe.png'}" alt="Image"></div>
            <div class="feed-content">
                <div class="feed-title">${art.title.substring(0, 45)}...</div>
                <div class="feed-desc">${art.desc}</div>
                <div class="vote-system">
                    <button class="vote-btn upvote ${activeUp}" onclick="registerVote(event, '${art.id}', 'up')">👍 <span class="count">${baseUp}</span></button>
                    <button class="vote-btn downvote ${activeDown}" onclick="registerVote(event, '${art.id}', 'down')">👎 <span class="count">${baseDown}</span></button>
                </div>
            </div>
        `;
        feed.appendChild(card);
    });
}

// AFFICHER L'ARTICLE SELECTIONNÉ AU CENTRE (GAUCHE)
function displayArticle(id) {
    const art = articles.find(a => a.id === id);
    const viewer = document.getElementById('articleViewer');
    if (!art) return;

    let interviewHTML = "";
    if(art.interview && art.interview.length > 0) {
        interviewHTML = `<div class="interview-box"><h3>L'Interview Exclusive</h3>`;
        art.interview.forEach(row => {
            interviewHTML += `<div class="interview-line"><strong>${row.q}</strong><br>${row.a}</div>`;
        });
        interviewHTML += `</div>`;
    }

    let noticeHTML = art.notice ? `<div class="redac-notice">⚠️ L'AVIS DE LA RÉDACTION : ${art.notice}</div>` : '';

    viewer.innerHTML = `
        <div class="meta-data">
            LE BLOG DES VÉRITÉS CACHÉES – La voix de ceux qui savent<br>
            Date de publication : ${art.date}<br>
            Localisation : ${art.location}<br>
            Auteur : ${art.author}
        </div>
        <div class="breaking-banner">Breaking News</div>
        <div class="hero-title-area">
            <h2>${art.title}</h2>
        </div>
        <div class="hero-image-container">
            <img src="${art.img || 'logo_chat_loupe.png'}" alt="Illustration">
        </div>
        <div class="article-body">
            <p>${art.intro}</p>
            ${interviewHTML}
            ${noticeHTML}
        </div>
    `;
}

// AJOUTER UN NOUVEL ARTICLE DEPUIS L'INTERFACE
function createNewArticle(e) {
    e.preventDefault();
    
    const title = document.getElementById('formTitle').value;
    const id = "art-" + Date.now();
    const date = document.getElementById('formDate').value;
    const location = document.getElementById('formLoc').value || "National";
    const author = document.getElementById('formAuthor').value;
    const intro = document.getElementById('formIntro').value;
    const notice = document.getElementById('formNotice').value;
    const img = document.getElementById('formImg').value || "logo_chat_loupe.png";
    
    // Parse de l'interview (découpe chaque ligne)
    const rawInterview = document.getElementById('formInterview').value;
    const interview = [];
    if(rawInterview.trim()) {
        const lines = rawInterview.split('\n');
        lines.forEach(line => {
            const parts = line.split(':');
            if(parts.length >= 2) {
                interview.push({ q: parts[0].trim(), a: parts.slice(1).join(':').trim() });
            }
        });
    }

    const newArt = {
        id, title, date, location, author, img,
        desc: intro.substring(0, 100) + "...",
        intro, interview, notice
    };

    articles.unshift(newArt); // Ajoute au début du tableau
    localStorage.setItem('blog_articles', JSON.stringify(articles));
    
    renderFeed();
    displayArticle(id);
    
    // Reset du formulaire & fermeture du panneau
    document.getElementById('adminPanel').style.display = 'none';
    e.target.reset();
}

// COUPLAGE DU SYSTEME DE VOTE
function registerVote(event, articleId, type) {
    event.stopPropagation(); // Évite de déclencher le clic de sélection de l'article
    let storageKey = 'vote_' + articleId;
    let currentVote = localStorage.getItem(storageKey);
    
    if (currentVote === type) {
        localStorage.removeItem(storageKey);
    } else {
        localStorage.setItem(storageKey, type);
    }
    renderFeed();
}

// AFFICHER/MASQUER LE PANNEAU SECRET (En cliquant sur le chat en haut à gauche)
function toggleAdminPanel() {
    const panel = document.getElementById('adminPanel');
    panel.style.display = panel.style.display === 'block' ? 'none' : 'block';
    if(panel.style.display === 'block') panel.scrollIntoView({ behavior: 'smooth' });
}

// CHARGEMENT INITIAL
document.addEventListener("DOMContentLoaded", () => {
    renderFeed();
    if(articles.length > 0) displayArticle(articles[0].id); // Charge le premier article par défaut
});
</script>
</body>
</html>
